<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RICHBOT</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
   * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Orbitron', sans-serif;
}

body {
    background: url('https://images.pexels.com/photos/8294554/pexels-photo-8294554.jpeg') no-repeat center center/cover fixed;
    color: white;
    text-align: center;
}

/* Header */
.header {
    background: none;
    padding: 15px;
    font-size: 22px;
    font-weight: bold;
    color: cyan;
    text-shadow: 0 0 10px cyan, 0 0 20px cyan;
}

/* Kotak Saldo */
.saldo-container {
    position: absolute;
    top: 70px;
    right: 10px;
    display: flex;
    flex-direction: column;
    gap: 5px;
}

.saldo-box {
    background: rgba(0, 0, 0, 0.7);
    padding: 6px 10px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    box-shadow: 0 0 5px cyan;
    font-size: 14px;
    width: 120px;
}

.saldo-box i {
    font-size: 16px;
    color: gold;
    margin-right: 6px;
}

.saldo-text {
    font-size: 14px;
    font-weight: bold;
    color: white;
}

.saldo-amount {
    font-size: 14px;
    font-weight: bold;
    color: gold;
    text-shadow: 0 0 5px gold;
}

/* Informasi Pengguna (ID & Username di pojok kiri atas) */
.user-info {
    position: absolute;
    top: 70px;
    left: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.user-box {
    background: rgba(0, 0, 0, 0.8);
    padding: 10px;
    border-radius: 8px;
    color: white;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 160px;
    box-shadow: 0 0 6px cyan;
    font-weight: bold;
}

.user-box i {
    color: cyan;
    font-size: 18px;
}

/* Nama di atas Progress Bar */
.user-name {
    text-align: center;
    font-size: 20px;
    font-weight: bold;
    color: white;
    text-shadow: 0 0 8px cyan;
    margin-bottom: 12px;
    position: relative;
    top: 120px;
}

/* Progress Bar */
.progress-container {
    width: 70%;
    display: flex;
    justify-content: space-between;
    margin: 130px auto 10px;
}

.progress-bar {
    width: 2%;
    height: 10px;
    background: rgba(255, 255, 255, 0.3);
    border-radius: 2px;
    transition: background 0.3s ease-in-out;
}

.progress-bar.active {
    background: cyan;
    box-shadow: 0 0 6px cyan;
}

/* Tombol Iklan Neon */
.triangle-button {
    width: 130px;
    height: 130px;
    background: url('https://static5.depositphotos.com/1004174/395/i/950/depositphotos_3950603-stock-photo-power-button.jpg') 
        no-repeat center center;
    background-size: cover;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    position: fixed; /* Tetap di layar */
    left: 50%;
    top: 60%;
    transform: translate(-50%, -50%); /* Tetap di tengah di semua perangkat */
    transform-origin: center;
    font-size: 24px;
    color: white;
    text-shadow: 0 0 15px cyan;
    transition: box-shadow 0.2s ease-in-out, opacity 0.2s ease-in-out, transform 0.2s ease-in-out;
    box-shadow: 0 0 18px cyan, inset 0 0 10px rgba(0, 255, 255, 0.6);
    animation: glow 1.5s infinite alternate;
    outline: none;
    border: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
}

/* Animasi cahaya */
@keyframes glow {
    0% {
        box-shadow: 0 0 12px cyan, inset 0 0 6px rgba(0, 255, 255, 0.4);
    }
    100% {
        box-shadow: 0 0 22px cyan, inset 0 0 15px rgba(0, 255, 255, 0.7);
    }
}

/* Hover & Klik - tidak mengubah posisi */
.triangle-button:hover {
    transform: translate(-50%, -50%) scale(1.05);
    opacity: 0.9;
}

.triangle-button:active {
    transform: translate(-50%, -50%) scale(0.95);
    box-shadow: 0 0 30px cyan, inset 0 0 18px rgba(0, 255, 255, 0.8);
    opacity: 1;
}

/* Disable mode */
.triangle-button.disabled {
    background: gray;
    cursor: not-allowed;
    box-shadow: none;
    opacity: 0.5;
}

/* Responsif untuk HP kecil */
@media (max-width: 480px) {
    .triangle-button {
        width: 100px;
        height: 100px;
    }
}



/* Navigasi Bawah */
.nav-bar {
    display: flex;
    justify-content: space-around;
    background: rgba(0, 0, 0, 0.8);
    padding: 12px 0;
    position: fixed;
    bottom: 0;
    width: 100%;
}

.nav-item {
    text-align: center;
    color: white;
    cursor: pointer;
}

.nav-item img {
    width: 24px;
    height: 24px;
}

.nav-item:hover {
    color: cyan;
}

.nav-item p {
    font-size: 12px;
    margin-top: 3px;
    transition: color 0.2s ease-in-out;
}

.nav-item:hover p {
    color: cyan;
}

/* Responsif */
@media (max-width: 600px) {
    .triangle-button {
        width: 100px;
        height: 100px;
        bottom: 150px;
    }
    .saldo-box {
        width: 100px;
    }
    .progress-container {
        width: 85%;
    }
    .nav-item img {
        width: 20px;
        height: 20px;
    }
}
    </style>
</head>
<body>

    <div class="header">
        RICHBOT v4.0 🤖
    </div>

    <!-- Kotak saldo lebih kecil & turun sedikit -->
    <div class="saldo-container">
        <div class="saldo-box">
            <i>💰</i>
            <div>
                <p class="saldo-text">Saldo</p>
                <p class="saldo-amount" id="availableCuan">Rp 0</p>
            </div>
        </div>
        <div class="saldo-box">
            <i>👥</i>
            <div>
                <p class="saldo-text">Reff</p>
                <p class="saldo-amount" id="reffCuan">Rp 0</p>
            </div>
        </div>
    </div>
    
    <!-- ID & Username dalam dua kotak terpisah -->
<div class="user-info">
    <div class="user-box">
        <i>🆔</i>
        <span id="userId">Memuat...</span>
    </div>
    <div class="user-box">
        <i>👤</i>
        <span id="username">Memuat...</span>
    </div>
</div>
    <!-- Nama di atas Progress Bar -->
<h2 id="displayName" class="user-name">Memuat...</h2>



    <!-- Progress Bar lebih ke bawah -->
    <div class="progress-container" id="progressContainer">
        <script>
            for (let i = 0; i < 25; i++) {
                document.write('<div class="progress-bar"></div>');
            }
        </script>
    </div>

    <div class="triangle-button" id="playButton" onclick="watchAd()">
        
    </div>

    <div class="nav-bar">
        <div class="nav-item" onclick="goToHome()">
            <img src="https://cdn-icons-png.flaticon.com/512/846/846551.png" alt="Home">
            <p>Home</p>
        </div>
        <div class="nav-item" onclick="withdraw()">
            <img src="https://cdn-icons-png.flaticon.com/512/2331/2331936.png" alt="Tarik Dana">
            <p>Tarik Dana</p>
        </div>
        <div class="nav-item" onclick="viewHistory()">
            <img src="https://cdn-icons-png.flaticon.com/512/2921/2921222.png" alt="Riwayat">
            <p>Riwayat</p>
        </div>
        <div class="nav-item" onclick="viewGuide()">
            <img src="https://cdn-icons-png.flaticon.com/512/3649/3649447.png" alt="Panduan">
            <p>Panduan</p>
        </div>
    </div>

    <script>
        function loadUserData() {
        let tg = window.Telegram.WebApp;

        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            let user = tg.initDataUnsafe.user;

            // Ambil ID, Username, dan Nama
            let userId = user.id || "Tidak Diketahui";
            let username = user.username ? "@" + user.username : "Tidak Ada Username";
            let name = user.first_name + (user.last_name ? " " + user.last_name : "");

            // Simpan dengan namespace khusus untuk RICHBOT v3.0
            localStorage.setItem("richbot_v3_id", userId);
            localStorage.setItem("richbot_v3_username", username);
            localStorage.setItem("richbot_v3_name", name);

            // Tampilkan di halaman
            displayUserData();
        } else {
            // Jika gagal memuat, coba ambil dari localStorage
            displayUserData();
        }
    }

    function displayUserData() {
        let userId = localStorage.getItem("richbot_v3_id") || "Belum Tersimpan";
        let username = localStorage.getItem("richbot_v3_username") || "Belum Tersimpan";
        let name = localStorage.getItem("richbot_v3_name") || "Belum Tersimpan";

        document.getElementById("userId").innerText = userId;
        document.getElementById("username").innerText = username;
        document.getElementById("displayName").innerText = name;
    }

    // Panggil fungsi saat halaman selesai dimuat
    window.onload = loadUserData;
        let maxAds = 25;

        function watchAd() {
            let availableCuan = document.getElementById("availableCuan");
            let playButton = document.getElementById("playButton");
            let progressBars = document.querySelectorAll(".progress-bar");

            let currentAds = document.querySelectorAll(".progress-bar.active").length;
            let currentCuan = parseInt(availableCuan.innerText.replace("Rp ", ""));

            if (currentAds < maxAds) {
                currentAds++;
                currentCuan += 14;

                availableCuan.innerText = "Rp " + currentCuan;
                progressBars[currentAds - 1].classList.add("active");

                if (currentAds === maxAds) {
                    playButton.classList.add("disabled");
                    playButton.onclick = null;
                }
            } else {
                alert("Limit iklan sudah tercapai hari ini!");
            }
        }
    </script>

</body>
</html>
